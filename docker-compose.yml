version: "3.8"

services:
  # ===========================================
  # PostgreSQL + PostGIS
  # ===========================================
  database:
    image: postgis/postgis:15-3.4
    container_name: geogamer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      # Persistent data
      - postgres_data:/var/lib/postgresql/data
      # Init scripts (automatisch ausgeführt)
      - ./backend/database/init:/docker-entrypoint-initdb.d:ro
      # GeoJSON data
      - ./backend/geo_data:/geo_data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geogamer-network

  # ===========================================
  # Backend (Node.js + Express)
  # ===========================================
  backend:
    env_file:
      - .env
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: geogamer-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "3000:3000"
    volumes:
      # Live reload - Code-Änderungen werden sofort übernommen
      - ./backend/src:/app/src:rw
      - ./backend/package.json:/app/package.json:ro
      # Prevent overwriting node_modules
      - backend_node_modules:/app/node_modules
    depends_on:
      database:
        condition: service_healthy
    networks:
      - geogamer-network
    command: npm run start

  # ===========================================
  # GeoServer
  # ===========================================
  geoserver:
    build:
      context: ./geoserver
    container_name: geogamer-geoserver
    ports:
      - "8080:8080"
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./geoserver/data_dir:/opt/geoserver_data
    entrypoint: [ "/bin/bash", "/opt/init.sh" ]
    depends_on:
      database:
        condition: service_healthy
    networks:
      - geogamer-network

  # ===========================================
  # Frontend (React + Vite)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: geogamer-frontend
    restart: unless-stopped
    environment:
      JAVA_OPTS: >
        -DDB_HOST=${DB_HOST}
        -DDB_PORT=${DB_PORT}
        -DDB_NAME=${DB_NAME}
        -DDB_USER=${DB_USER}
        -DDB_PASSWORD=${DB_PASSWORD}
      VITE_API_BASE: ${VITE_API_BASE}
      VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY}
    ports:
      - "5173:5173"
    volumes:
      # Live reload
      - ./frontend/src:/app/src:rw
      - ./frontend/public:/app/public:rw
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/vite.config.js:/app/vite.config.js:ro
      # Prevent overwriting node_modules
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - geogamer-network
    command: npm run dev

  # ===========================================
  # pgAdmin
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: geogamer-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - database
    networks:
      - geogamer-network

volumes:
  postgres_data:
  pgadmin_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  geogamer-network:
    driver: bridge
