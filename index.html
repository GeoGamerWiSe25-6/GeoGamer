<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoGamer</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>GeoGamer App</h1>
<div id="map"></div>
<script type="module" src="app.js"></script>
<div id="mapview-control" class="map-ui">
    <div class="mapview-control-title">Kartenansicht</div>

    <div> <br>
    <button data-mapview="satellite" class="active">
        Satellit
    </button>

    <button data-mapview="osm" >
        OSM
    </button>

    <button data-mapview="topo-vector">
        Topographisch
    </button>
    </div>
</div>
<div id="attribution" style="text-align: right">
    © OpenStreetMap contributors
</div>
</body>
</html>
